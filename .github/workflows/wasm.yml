name: WebAssembly Build

# Controls when the action will run. 
on:
  # Triggers the workflow on all push or pull request events
  push:
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

env:
  EM_VERSION: 5.0.3
  EM_SYSTEM_CACHE_FOLDER: emscripten-cache
  WEB_DIST_DIR: web-dist

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: before_install
        run: sudo -H DEBIAN_FRONTEND=noninteractive apt-get update

      - uses: mymindstorm/setup-emsdk@v14
        id: install-emscripten
        with:
          version: ${{env.EM_VERSION}}
          actions-cache-folder: 'emsdk-cache'

      - name: Setup Emscripten system cache
        uses: actions/cache@v5
        with:
          path: ${{ env.EM_SYSTEM_CACHE_FOLDER }}
          key: ${{ runner.os }}-${{ env.EM_VERSION }}-system-cache

      - name: Configure Emscripten cache
        run: |
          mkdir -p "$EM_SYSTEM_CACHE_FOLDER"
          echo "EM_CACHE=$GITHUB_WORKSPACE/$EM_SYSTEM_CACHE_FOLDER" >> "$GITHUB_ENV"

      - name: Add LLVM tools to PATH
        run: echo "$EMSDK/upstream/bin" >> "$GITHUB_PATH"

      - name: build
        run: |
          make ARCH=WASM BUILD_TYPE=debug clean all
          make ARCH=WASM BUILD_TYPE=production clean all

      - name: Create artifacts
        uses: actions/upload-artifact@v7
        with:
          name: digger-wasm
          path: ${{ env.WEB_DIST_DIR }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        if: github.event_name != 'pull_request'
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Upload to AWS
        if: github.event_name != 'pull_request'
        run: |
          if [ "${GITHUB_REF_NAME}" = "master" ]; then
            s3_prefix="s3://digger-build-artefacts"
          else
            s3_prefix="s3://digger-build-artefacts/${GITHUB_REF_NAME}"
          fi
          aws s3 cp "$WEB_DIST_DIR" "${s3_prefix}/" --recursive
