name: macOS Package

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:
  workflow_call:
    outputs:
      package_artifacts:
        description: Package artifact names uploaded by this workflow.
        value: ${{ jobs.build_pkg.outputs.package_artifacts }}

jobs:
  build_pkg:
    runs-on: macos-latest
    outputs:
      package_artifacts: ${{ steps.package_artifacts.outputs.names }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Install dependencies
        run: |
          brew update
          brew install cmake sdl2 zlib

      - name: Configure
        run: |
          cmake -S . -B build-macos \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local

      - name: Build
        run: |
          cmake --build build-macos --parallel

      - name: Stage install
        run: |
          rm -rf pkgroot dist
          cmake --install build-macos --prefix "${PWD}/pkgroot/usr/local"
          mkdir -p pkgroot/usr/local/lib/digger
          sdl_lib="$(sdl2-config --prefix)/lib/libSDL2-2.0.0.dylib"
          cp "${sdl_lib}" pkgroot/usr/local/lib/digger/
          linked_sdl="$(otool -L pkgroot/usr/local/bin/digger | awk '/libSDL2.*dylib/ {print $1; exit}')"
          test -n "${linked_sdl}"
          install_name_tool \
            -change "${linked_sdl}" \
            "@executable_path/../lib/digger/libSDL2-2.0.0.dylib" \
            pkgroot/usr/local/bin/digger
          otool -L pkgroot/usr/local/bin/digger

      - name: Build package
        run: |
          mkdir -p dist
          pkgbuild \
            --root pkgroot \
            --identifier org.digger.digger \
            --version 20110912 \
            --install-location / \
            dist/digger-macos.pkg

      - name: Test package
        run: |
          brew uninstall --ignore-dependencies --force cmake sdl2 zlib
          brew list --versions cmake sdl2 zlib || true
          sudo installer -pkg dist/digger-macos.pkg -target /
          otool -L /usr/local/bin/digger
          if otool -L /usr/local/bin/digger | awk '$1 ~ "^(/opt/homebrew|/usr/local)/(opt|Cellar)/" { print; bad = 1 } END { exit bad }'; then
            :
          else
            echo "digger still links against Homebrew libraries" >&2
            exit 1
          fi
          TEST_TYPES=quick DIGGER_BIN=/usr/local/bin/digger sh -x ./scripts/do-test-run.sh

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: digger-macos-pkg
          path: dist/digger-macos.pkg

      - name: Set package artifact output
        id: package_artifacts
        run: |
          {
            echo 'names<<EOF'
            echo 'digger-macos-pkg'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
